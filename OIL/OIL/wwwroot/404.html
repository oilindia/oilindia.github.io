<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OIL Systems - Redirecting...</title>
    <script type="text/javascript">
        // Single Page Application (SPA) - URL Mapper
        // This script converts a deep link into a query string so index.html can read it.
        // Example: yoursite.com/dashboard -> yoursite.com/?/dashboard

        var pathSegmentsToKeep = 0; // Set to 1 if hosting in a subfolder like yoursite.com/oilapp/

        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body style="background-color: #f3f3f3; font-family: 'Roboto', sans-serif;">
    <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; color:#D32F2F;">
        <p>Redirecting to OIL Systems...</p>
    </div>
</body>
</html>
