<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>OIL</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="icon" type="image/x-icon" href="favicon.png">

</head>

<body>
    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:Roboto, sans-serif;">
            <div style="text-align:center;">
                <div style="border: 4px solid #f3f3f3; border-top: 4px solid #594ae2; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin:auto;"></div>
                <p style="margin-top:10px;">Loading OIL Systems...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.getElementDimensions = (id) => {
            const el = document.getElementById(id);
            if (!el) return { width: 0, height: 0 };
            return { width: el.offsetWidth, height: el.offsetHeight };
        };

        window.scrollToMarker = (containerId, xPercent, yPercent) => {
            const container = document.getElementById(containerId).parentElement;
            const map = document.getElementById(containerId);

            if (container && map) {
                const x = (map.clientWidth * (xPercent / 100)) - (container.clientWidth / 2);
                const y = (map.clientHeight * (yPercent / 100)) - (container.clientHeight / 2);

                container.scrollTo({ top: y, left: x, behavior: 'smooth' });
            }
        };
    </script>

    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
